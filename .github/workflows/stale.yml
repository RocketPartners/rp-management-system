name: Stale PRs

on:
  schedule:
    - cron: '0 9 * * 1' # Every Monday at 9am UTC

permissions:
  pull-requests: write

jobs:
  stale:
    name: Flag Stale PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          stale-pr-message: >
            This PR has been inactive for 14 days. It will be closed in 7 days
            if there is no further activity. If this is still in progress,
            please push a commit or leave a comment.
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          exempt-pr-labels: 'in-progress,do-not-close'
          days-before-issue-stale: -1
          days-before-issue-close: -1
